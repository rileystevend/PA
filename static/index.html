<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PA — Personal Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header .status {
      font-size: 12px;
      color: #666;
      margin-left: auto;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      line-height: 1.6;
    }

    .message.user {
      align-self: flex-end;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px 12px 4px 12px;
      padding: 12px 16px;
      max-width: 480px;
      color: #c8c8f0;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .message.assistant .content {
      background: #141414;
      border: 1px solid #222;
      border-radius: 4px 12px 12px 12px;
      padding: 16px 20px;
    }

    /* Markdown rendering */
    .message.assistant h1, .message.assistant h2, .message.assistant h3 {
      margin: 12px 0 6px;
      font-weight: 600;
    }
    .message.assistant h2 { font-size: 15px; color: #a0a0c0; }
    .message.assistant h3 { font-size: 14px; color: #888; }
    .message.assistant p { margin: 6px 0; }
    .message.assistant ul, .message.assistant ol { margin: 6px 0 6px 20px; }
    .message.assistant li { margin: 3px 0; }
    .message.assistant strong { color: #ddd; }
    .message.assistant code {
      background: #1e1e1e;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 13px;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .message.assistant hr {
      border: none;
      border-top: 1px solid #222;
      margin: 12px 0;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #666;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #input-area {
      padding: 16px 24px;
      border-top: 1px solid #222;
    }

    #input-wrap {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: #141414;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e8e8e8;
      font-size: 15px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 200px;
      font-family: inherit;
      line-height: 1.5;
    }
    #input:focus { border-color: #444; }
    #input::placeholder { color: #444; }

    #send-btn {
      background: #2a2a6a;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      color: #a0a0e0;
      cursor: pointer;
      font-size: 18px;
      height: 48px;
      transition: background 0.15s;
    }
    #send-btn:hover { background: #3a3a8a; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    .setup-banner {
      background: #1a1200;
      border: 1px solid #3a2800;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #c8a040;
      margin: 0 auto;
      max-width: 780px;
    }
    .setup-banner a { color: #e0b860; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #444;
    }
    .empty-state h2 { font-size: 20px; color: #555; }
    .empty-state p { font-size: 14px; }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .suggestion {
      background: #141414;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
    }
    .suggestion:hover {
      background: #1a1a2e;
      border-color: #2a2a4a;
      color: #a0a0c0;
    }
  </style>
</head>
<body>

<header>
  <h1>PA</h1>
  <span class="status" id="status">Personal Assistant</span>
</header>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <h2>Good morning.</h2>
    <p>What can I help you with?</p>
    <div class="suggestions">
      <div class="suggestion" onclick="sendSuggestion('Morning briefing')">Morning briefing</div>
      <div class="suggestion" onclick="sendSuggestion(&quot;What's on my calendar today?&quot;)">Today's calendar</div>
      <div class="suggestion" onclick="sendSuggestion('Any important emails?')">Important emails</div>
      <div class="suggestion" onclick="sendSuggestion('What\'s the weather?')">Weather</div>
      <div class="suggestion" onclick="sendSuggestion('What\'s in the news?')">News headlines</div>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="input-wrap">
    <textarea id="input" placeholder="Ask anything..." rows="1"></textarea>
    <button id="send-btn" onclick="send()">&#9650;</button>
  </div>
</div>

<script>
  const input = document.getElementById('input');
  const messages = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const sendBtn = document.getElementById('send-btn');
  let streaming = false;

  // Check URL for OAuth success
  const params = new URLSearchParams(window.location.search);
  if (params.get('connected')) {
    const provider = params.get('connected');
    addSystemMessage(`${provider.charAt(0).toUpperCase() + provider.slice(1)} connected successfully.`);
    window.history.replaceState({}, '', '/');
  }

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 200) + 'px';
  });

  // Submit on Enter (Shift+Enter for newline)
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  function sendSuggestion(text) {
    input.value = text;
    send();
  }

  function send() {
    const text = input.value.trim();
    if (!text || streaming) return;

    hideEmptyState();
    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';

    streamMessage(text);
  }

  async function streamMessage(message) {
    streaming = true;
    sendBtn.disabled = true;

    const msgEl = addMessage('assistant', '');
    const contentEl = msgEl.querySelector('.content');
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    contentEl.appendChild(cursor);

    let fullText = '';

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });

      if (!resp.ok) {
        contentEl.innerHTML = `<p style="color:#e05050">Error ${resp.status}: ${resp.statusText}</p>`;
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try {
            const parsed = JSON.parse(data);
            if (parsed.text) {
              fullText += parsed.text;
              cursor.remove();
              contentEl.innerHTML = renderMarkdown(fullText);
              contentEl.appendChild(cursor);
              messages.scrollTop = messages.scrollHeight;
            }
          } catch {}
        }
      }
    } catch (err) {
      contentEl.innerHTML = `<p style="color:#e05050">Connection error: ${err.message}</p>`;
    } finally {
      cursor.remove();
      streaming = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function addMessage(role, text) {
    const el = document.createElement('div');
    el.className = `message ${role}`;
    if (role === 'assistant') {
      el.innerHTML = `<div class="content">${renderMarkdown(text)}</div>`;
    } else {
      el.textContent = text;
    }
    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
    return el;
  }

  function addSystemMessage(text) {
    const el = document.createElement('div');
    el.style.cssText = 'text-align:center;color:#666;font-size:13px;padding:8px';
    el.textContent = text;
    messages.appendChild(el);
  }

  function hideEmptyState() {
    if (emptyState) emptyState.remove();
  }

  // Minimal markdown renderer (bold, italic, headers, lists, tables, hr, code)
  function renderMarkdown(text) {
    const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const inline = s => esc(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');

    const lines = text.split('\n');
    const out = [];
    let i = 0;

    while (i < lines.length) {
      const line = lines[i];
      // Table: header row followed by separator row
      if (/^\|/.test(line) && i + 1 < lines.length && /^\|[-:| ]+\|/.test(lines[i + 1])) {
        const parseRow = r => r.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
        const headers = parseRow(line);
        i += 2; // skip header + separator
        const rows = [];
        while (i < lines.length && /^\|/.test(lines[i])) {
          rows.push(parseRow(lines[i]));
          i++;
        }
        const ths = headers.map(h => `<th>${inline(h)}</th>`).join('');
        const trs = rows.map(r => '<tr>' + r.map(c => `<td>${inline(c)}</td>`).join('') + '</tr>').join('');
        out.push(`<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`);
        continue;
      }
      // Headers
      const h3 = line.match(/^### (.+)$/); if (h3) { out.push(`<h3>${inline(h3[1])}</h3>`); i++; continue; }
      const h2 = line.match(/^## (.+)$/);  if (h2) { out.push(`<h2>${inline(h2[1])}</h2>`); i++; continue; }
      const h1 = line.match(/^# (.+)$/);   if (h1) { out.push(`<h1>${inline(h1[1])}</h1>`); i++; continue; }
      // HR
      if (/^---$/.test(line)) { out.push('<hr>'); i++; continue; }
      // List items — collect consecutive
      if (/^[-*] /.test(line)) {
        const items = [];
        while (i < lines.length && /^[-*] /.test(lines[i])) {
          items.push(`<li>${inline(lines[i].slice(2))}</li>`);
          i++;
        }
        out.push(`<ul>${items.join('')}</ul>`);
        continue;
      }
      // Blank line
      if (line.trim() === '') { out.push(''); i++; continue; }
      // Paragraph
      out.push(`<p>${inline(line)}</p>`);
      i++;
    }

    return out.join('\n');
  }
</script>
</body>
</html>
