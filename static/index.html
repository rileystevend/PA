<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PA — Personal Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header .status {
      font-size: 12px;
      color: #666;
      margin-left: auto;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 16px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .clear-btn:hover { color: #888; background: #1a1a1a; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      line-height: 1.6;
    }

    .message.user {
      align-self: flex-end;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px 12px 4px 12px;
      padding: 12px 16px;
      max-width: 480px;
      color: #c8c8f0;
    }

    .message.assistant {
      align-self: flex-start;
      position: relative;
    }

    .message.assistant .content {
      background: #141414;
      border: 1px solid #222;
      border-radius: 4px 12px 12px 12px;
      padding: 16px 20px;
    }

    /* Copy button */
    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #555;
      cursor: pointer;
      font-size: 13px;
      padding: 4px 8px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .copy-btn:hover { color: #aaa; }
    .message.assistant:hover .copy-btn { opacity: 1; }
    /* Always visible on touch devices */
    @media (hover: none) { .copy-btn { opacity: 1; } }

    /* Markdown rendering */
    .message.assistant h1, .message.assistant h2, .message.assistant h3 {
      margin: 12px 0 6px;
      font-weight: 600;
    }
    .message.assistant h2 { font-size: 15px; color: #a0a0c0; }
    .message.assistant h3 { font-size: 14px; color: #888; }
    .message.assistant p { margin: 6px 0; }
    .message.assistant ul, .message.assistant ol { margin: 6px 0 6px 20px; }
    .message.assistant li { margin: 3px 0; }
    .message.assistant strong { color: #ddd; }
    .message.assistant code {
      background: #1e1e1e;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 13px;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .message.assistant hr {
      border: none;
      border-top: 1px solid #222;
      margin: 12px 0;
    }
    .message.assistant a {
      color: #7090d0;
      text-decoration: none;
    }
    .message.assistant a:hover { text-decoration: underline; }
    .message.assistant a:focus { outline: 2px solid #7090d0; border-radius: 2px; }

    /* Table styling */
    .message.assistant .table-wrap {
      overflow-x: auto;
      margin: 8px 0;
    }
    .message.assistant table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }
    .message.assistant th, .message.assistant td {
      border: 1px solid #2a2a2a;
      padding: 6px 12px;
      text-align: left;
    }
    .message.assistant th {
      background: #1a1a1a;
      color: #a0a0c0;
      font-weight: 600;
    }
    .message.assistant tr:nth-child(even) td { background: #141414; }
    .message.assistant tr:nth-child(odd) td  { background: #111111; }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #666;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #input-area {
      padding: 16px 24px;
      border-top: 1px solid #222;
    }

    #input-wrap {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: #141414;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e8e8e8;
      font-size: 15px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 200px;
      font-family: inherit;
      line-height: 1.5;
    }
    #input:focus { border-color: #444; }
    #input::placeholder { color: #444; }

    #send-btn {
      background: #2a2a6a;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      color: #a0a0e0;
      cursor: pointer;
      font-size: 18px;
      height: 48px;
      transition: background 0.15s;
    }
    #send-btn:hover { background: #3a3a8a; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    .setup-banner {
      background: #1a1200;
      border: 1px solid #3a2800;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #c8a040;
      margin: 0 auto;
      max-width: 780px;
    }
    .setup-banner a { color: #e0b860; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #444;
    }
    .empty-state h2 { font-size: 20px; color: #555; }
    .empty-state p { font-size: 14px; }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .suggestion {
      background: #141414;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
    }
    .suggestion:hover {
      background: #1a1a2e;
      border-color: #2a2a4a;
      color: #a0a0c0;
    }

    /* Undo toast */
    #undo-toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 100;
    }
    #undo-toast.visible { opacity: 1; pointer-events: auto; }
    #undo-toast button {
      background: none;
      border: none;
      color: #7090d0;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
      font-weight: 600;
    }
    #undo-toast button:hover { color: #90b0f0; }
  </style>
</head>
<body>

<header>
  <h1>PA</h1>
  <span class="status" id="status" aria-live="polite">Personal Assistant</span>
  <button class="clear-btn" id="clear-btn" onclick="clearConversation()" aria-label="Clear conversation" title="Clear conversation">⊘</button>
</header>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <h2 id="greeting-text">Good morning.</h2>
    <p>What can I help you with?</p>
    <div class="suggestions">
      <div class="suggestion" onclick="sendSuggestion('Morning briefing')">Morning briefing</div>
      <div class="suggestion" onclick="sendSuggestion(&quot;What's on my calendar today?&quot;)">Today's calendar</div>
      <div class="suggestion" onclick="sendSuggestion('Any important emails?')">Important emails</div>
      <div class="suggestion" onclick="sendSuggestion(&quot;What's the weather?&quot;)">Weather</div>
      <div class="suggestion" onclick="sendSuggestion(&quot;What's in the news?&quot;)">News headlines</div>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="input-wrap">
    <textarea id="input" placeholder="Ask anything..." rows="1"></textarea>
    <button id="send-btn" onclick="send()">&#9650;</button>
  </div>
</div>

<div id="undo-toast">
  Conversation cleared.
  <button onclick="undoClear()">Undo</button>
</div>

<script>
  const input = document.getElementById('input');
  const messages = document.getElementById('messages');
  const sendBtn = document.getElementById('send-btn');
  const statusEl = document.getElementById('status');
  const undoToast = document.getElementById('undo-toast');

  let streaming = false;
  let undoSnapshot = null;  // stores [{role, text}] for undo
  let undoTimer = null;

  const STORAGE_KEY = 'pa_conversation';
  const MAX_MESSAGES = 50;

  // --- Greeting ---
  function greeting() {
    const h = new Date().getHours();
    if (h >= 5 && h < 12) return 'Good morning.';
    if (h >= 12 && h < 17) return 'Good afternoon.';
    if (h >= 17 && h < 21) return 'Good evening.';
    return 'Working late?';
  }
  document.getElementById('greeting-text').textContent = greeting();

  // Check URL for OAuth success
  const params = new URLSearchParams(window.location.search);
  if (params.get('connected')) {
    const provider = params.get('connected');
    addSystemMessage(`${provider.charAt(0).toUpperCase() + provider.slice(1)} connected successfully.`);
    window.history.replaceState({}, '', '/');
  }

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 200) + 'px';
  });

  // Submit on Enter (Shift+Enter for newline)
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // --- Conversation persistence ---
  function saveConversation() {
    const msgs = [...messages.querySelectorAll('.message')].map(el => ({
      role: el.classList.contains('user') ? 'user' : 'assistant',
      text: el.classList.contains('user') ? el.textContent : el.querySelector('.content').innerHTML,
      isHTML: el.classList.contains('assistant'),
    }));
    const capped = msgs.slice(-MAX_MESSAGES);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(capped));
    } catch (e) {
      // QuotaExceededError — degrade silently
    }
  }

  function loadConversation() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const msgs = JSON.parse(raw);
      if (!Array.isArray(msgs) || msgs.length === 0) return;

      hideEmptyState();
      for (const m of msgs) {
        const el = document.createElement('div');
        el.className = `message ${m.role}`;
        if (m.role === 'assistant') {
          el.innerHTML = `
            <div class="content">${m.text}</div>
            <button class="copy-btn" aria-label="Copy response" onclick="copyMessage(this)">Copy</button>
          `;
        } else {
          el.textContent = m.text;
        }
        messages.appendChild(el);
      }
      messages.scrollTop = messages.scrollHeight;
    } catch (e) {
      // Corrupted JSON — show empty state (already shown by default)
    }
  }

  function clearConversation() {
    // Snapshot for undo
    undoSnapshot = localStorage.getItem(STORAGE_KEY);

    // Clear
    localStorage.removeItem(STORAGE_KEY);
    [...messages.querySelectorAll('.message, [style*="text-align"]')].forEach(el => el.remove());
    showEmptyState();

    // Show undo toast
    clearTimeout(undoTimer);
    undoToast.classList.add('visible');
    undoTimer = setTimeout(() => {
      undoToast.classList.remove('visible');
      undoSnapshot = null;
    }, 4000);
  }

  function undoClear() {
    clearTimeout(undoTimer);
    undoToast.classList.remove('visible');
    if (!undoSnapshot) return;
    try {
      localStorage.setItem(STORAGE_KEY, undoSnapshot);
    } catch (e) {}
    undoSnapshot = null;
    // Reload from storage
    hideEmptyState();
    [...messages.querySelectorAll('.message')].forEach(el => el.remove());
    loadConversation();
  }

  // Load history on page start
  loadConversation();

  // --- Sending ---
  function sendSuggestion(text) {
    input.value = text;
    send();
  }

  function send() {
    const text = input.value.trim();
    if (!text || streaming) return;

    hideEmptyState();
    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';

    streamMessage(text);
  }

  async function streamMessage(message) {
    streaming = true;
    sendBtn.disabled = true;
    statusEl.textContent = 'Thinking...';

    const msgEl = addMessage('assistant', '');
    const contentEl = msgEl.querySelector('.content');
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    contentEl.appendChild(cursor);

    let fullText = '';
    let gotFirstToken = false;

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });

      if (!resp.ok) {
        contentEl.innerHTML = `<p style="color:#e05050">Error ${resp.status}: ${resp.statusText}</p>`;
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try {
            const parsed = JSON.parse(data);
            if (parsed.text) {
              if (!gotFirstToken) {
                gotFirstToken = true;
                statusEl.textContent = 'Responding...';
              }
              fullText += parsed.text;
              cursor.remove();
              contentEl.innerHTML = renderMarkdown(fullText);
              contentEl.appendChild(cursor);
              messages.scrollTop = messages.scrollHeight;
            }
          } catch {}
        }
      }
    } catch (err) {
      contentEl.innerHTML = `<p style="color:#e05050">Connection error: ${err.message}</p>`;
    } finally {
      cursor.remove();
      streaming = false;
      sendBtn.disabled = false;
      statusEl.textContent = 'Personal Assistant';
      input.focus();
      // Add copy button now that the message is complete
      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.setAttribute('aria-label', 'Copy response');
      copyBtn.textContent = 'Copy';
      copyBtn.onclick = function() { copyMessage(this); };
      msgEl.appendChild(copyBtn);
      // Save completed conversation
      saveConversation();
    }
  }

  function addMessage(role, text) {
    const el = document.createElement('div');
    el.className = `message ${role}`;
    if (role === 'assistant') {
      el.innerHTML = `<div class="content">${renderMarkdown(text)}</div>`;
    } else {
      el.textContent = text;
    }
    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
    return el;
  }

  function addSystemMessage(text) {
    const el = document.createElement('div');
    el.style.cssText = 'text-align:center;color:#666;font-size:13px;padding:8px';
    el.textContent = text;
    messages.appendChild(el);
  }

  function hideEmptyState() {
    const es = document.getElementById('empty-state');
    if (es) es.remove();
  }

  function showEmptyState() {
    const es = document.createElement('div');
    es.className = 'empty-state';
    es.id = 'empty-state';
    es.innerHTML = `
      <h2>${greeting()}</h2>
      <p>What can I help you with?</p>
      <div class="suggestions">
        <div class="suggestion" onclick="sendSuggestion('Morning briefing')">Morning briefing</div>
        <div class="suggestion" onclick="sendSuggestion(&quot;What's on my calendar today?&quot;)">Today's calendar</div>
        <div class="suggestion" onclick="sendSuggestion('Any important emails?')">Important emails</div>
        <div class="suggestion" onclick="sendSuggestion(&quot;What's the weather?&quot;)">Weather</div>
        <div class="suggestion" onclick="sendSuggestion(&quot;What's in the news?&quot;)">News headlines</div>
      </div>
    `;
    messages.insertBefore(es, messages.firstChild);
  }

  // --- Copy ---
  async function copyMessage(btn) {
    const content = btn.previousElementSibling;
    const text = content ? content.innerText : '';
    try {
      await navigator.clipboard.writeText(text);
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.style.color = '#70c070';
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
    } catch (e) {
      btn.textContent = 'Failed';
      setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
    }
  }

  // --- Markdown renderer ---
  function renderMarkdown(text) {
    const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const inline = s => esc(s)
      // Links — allowlist https?:// only (blocks javascript:, data:)
      .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');

    const lines = text.split('\n');
    const out = [];
    let i = 0;

    while (i < lines.length) {
      const line = lines[i];
      // Table: header row followed by separator row
      if (/^\|/.test(line) && i + 1 < lines.length && /^\|[-:| ]+\|/.test(lines[i + 1])) {
        const parseRow = r => r.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
        const headers = parseRow(line);
        i += 2; // skip header + separator
        const rows = [];
        while (i < lines.length && /^\|/.test(lines[i])) {
          rows.push(parseRow(lines[i]));
          i++;
        }
        const ths = headers.map(h => `<th>${inline(h)}</th>`).join('');
        const trs = rows.map(r => '<tr>' + r.map(c => `<td>${inline(c)}</td>`).join('') + '</tr>').join('');
        out.push(`<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`);
        continue;
      }
      // Headers
      const h3 = line.match(/^### (.+)$/); if (h3) { out.push(`<h3>${inline(h3[1])}</h3>`); i++; continue; }
      const h2 = line.match(/^## (.+)$/);  if (h2) { out.push(`<h2>${inline(h2[1])}</h2>`); i++; continue; }
      const h1 = line.match(/^# (.+)$/);   if (h1) { out.push(`<h1>${inline(h1[1])}</h1>`); i++; continue; }
      // HR
      if (/^---$/.test(line)) { out.push('<hr>'); i++; continue; }
      // List items — collect consecutive
      if (/^[-*] /.test(line)) {
        const items = [];
        while (i < lines.length && /^[-*] /.test(lines[i])) {
          items.push(`<li>${inline(lines[i].slice(2))}</li>`);
          i++;
        }
        out.push(`<ul>${items.join('')}</ul>`);
        continue;
      }
      // Blank line
      if (line.trim() === '') { out.push(''); i++; continue; }
      // Paragraph
      out.push(`<p>${inline(line)}</p>`);
      i++;
    }

    return out.join('\n');
  }
</script>
</body>
</html>
