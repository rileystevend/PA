<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PA — Personal Assistant</title>

  <!-- PWA / home screen -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PA">
  <meta name="theme-color" content="#0d0d0b">

  <!-- Design system fonts: Fraunces (display) · Instrument Serif (reading) · Geist (UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300&family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    html { color-scheme: dark; }

    :root {
      --bg:           #0d0d0b;
      --surface:      #141412;
      --surface-2:    #1a1a16;
      --border:       #222218;
      --border-2:     #2a2a22;
      --text:         #e8e4d4;
      --text-muted:   #70685a;
      --text-dim:     #48443a;
      --accent:       #c8974a;
      --accent-light: #f0c878;
      --accent-dim:   #1e180a;
      --user-bg:      #12120e;
      --user-border:  #2a2218;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh; /* shrinks when iOS keyboard appears */
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* respect iPhone notch / home indicator */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    header {
      height: 57px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      position: relative;
      z-index: 60; /* above sidebar-backdrop (49) and sidebar (50) */
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header .status {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 16px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
      /* 44px minimum touch target */
      min-height: 44px;
      min-width: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover { color: var(--text-muted); background: var(--surface-2); }
    .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── Layout ─────────────────────────────────────────── */
    #main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    #sidebar {
      width: 220px;
      min-width: 220px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow-y: auto;
      transition: width 0.2s ease, min-width 0.2s ease, opacity 0.15s;
    }
    #sidebar.collapsed {
      width: 0;
      min-width: 0;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
      border-right: none;
    }

    /* Mobile overlay backdrop */
    #sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 49;
      background: rgba(0,0,0,0.5);
    }


    /* On narrow viewports, sidebar defaults to collapsed and overlays the chat */
    @media (max-width: 600px) {
      #sidebar {
        position: absolute;
        top: 57px; /* header height */
        left: 0;
        bottom: 0;
        z-index: 50;
        box-shadow: 4px 0 16px rgba(0,0,0,0.6);
      }
      #sidebar:not(.collapsed) {
        width: 220px;
        min-width: 220px;
      }
      #sidebar-backdrop.visible { display: block; }
      #input-area { padding: 12px; }
    }

    .sidebar-section {
      padding: 10px 12px 6px;
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0 4px;
      margin-bottom: 6px;
    }

    .quick-action {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
      background: none;
      border: none;
      border-radius: 8px;
      padding: 9px 8px;
      cursor: pointer;
      text-align: left;
      color: var(--text-muted);
      transition: background 0.12s, color 0.12s;
      margin-bottom: 2px;
    }
    .quick-action:hover {
      background: var(--surface-2);
      color: var(--text);
    }
    .quick-action:active { background: var(--surface-2); }
    .quick-action:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

    .qa-icon {
      font-size: 15px;
      line-height: 1.3;
      flex-shrink: 0;
    }

    .qa-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .qa-title {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .qa-desc {
      font-size: 10px;
      color: var(--text-dim);
      line-height: 1.3;
    }
    .quick-action:hover .qa-desc { color: var(--text-muted); }

    .sidebar-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2px 12px;
    }

    /* ── Chat area ───────────────────────────────────────── */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .message {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      line-height: 1.6;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-radius: 12px 12px 4px 12px;
      padding: 12px 16px;
      max-width: 480px;
      color: var(--text);
    }

    .message.assistant {
      align-self: flex-start;
      position: relative;
    }

    .message.assistant .content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px 12px 12px 12px;
      padding: 16px 20px;
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 15px;
    }

    /* Copy button */
    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 6px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 13px;
      padding: 4px 8px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .copy-btn:hover { color: var(--text-muted); }
    .message.assistant:hover .copy-btn { opacity: 1; }
    @media (hover: none) { .copy-btn { opacity: 1; } }

    /* Markdown rendering */
    .message.assistant h1, .message.assistant h2, .message.assistant h3 {
      margin: 16px 0 6px;
      font-family: 'Geist', sans-serif;
      font-weight: 600;
    }
    .message.assistant h2 { font-size: 15px; color: var(--accent-light); }
    .message.assistant h3 { font-size: 14px; color: var(--text-muted); }
    .message.assistant p { margin: 10px 0; }
    .message.assistant p:first-child { margin-top: 0; }
    .message.assistant p:last-child { margin-bottom: 0; }
    .message.assistant ul, .message.assistant ol { margin: 8px 0 8px 20px; }
    .message.assistant li { margin: 4px 0; }
    .message.assistant strong { color: var(--text); }
    .message.assistant code {
      background: var(--surface-2);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 13px;
      font-family: 'Geist Mono', "SF Mono", monospace;
    }
    .message.assistant hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }
    .message.assistant a {
      color: var(--accent);
      text-decoration: none;
    }
    .message.assistant a:hover { text-decoration: underline; }
    .message.assistant a:focus { outline: 2px solid var(--accent); border-radius: 2px; }

    /* Table styling */
    .message.assistant .table-wrap {
      overflow-x: auto;
      margin: 8px 0;
    }
    .message.assistant table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }
    .message.assistant th, .message.assistant td {
      border: 1px solid var(--border-2);
      padding: 6px 12px;
      text-align: left;
    }
    .message.assistant th {
      background: var(--surface-2);
      color: var(--accent-light);
      font-weight: 600;
      font-family: 'Geist', sans-serif;
    }
    .message.assistant tr:nth-child(even) td { background: var(--surface); }
    .message.assistant tr:nth-child(odd) td  { background: var(--bg); }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input-wrap {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 15px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 200px;
      font-family: 'Geist', -apple-system, sans-serif;
      line-height: 1.5;
    }
    #input:focus { border-color: var(--accent); outline: none; }
    #input:focus-visible { border-color: var(--accent); outline: none; }
    #input::placeholder { color: var(--text-dim); }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      color: var(--bg);
      cursor: pointer;
      font-size: 18px;
      height: 48px;
      transition: background 0.15s;
    }
    #send-btn:hover { background: var(--accent-light); }
    #send-btn:focus-visible { outline: 2px solid var(--accent-light); outline-offset: 2px; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    .setup-banner {
      background: var(--accent-dim);
      border: 1px solid var(--user-border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--accent);
      margin: 0 auto;
      max-width: 720px;
    }
    .setup-banner a { color: var(--accent-light); }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-dim);
    }
    .empty-state h2 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 42px;
      font-weight: 300;
      line-height: 1.1;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      text-wrap: balance;
    }
    .empty-state p { font-size: 14px; color: var(--text-muted); }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
    }
    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .suggestion:hover {
      background: var(--surface-2);
      border-color: var(--border-2);
      color: var(--text);
    }
    .suggestion:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* Undo toast */
    #undo-toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 100;
    }
    #undo-toast.visible { opacity: 1; pointer-events: auto; }
    #undo-toast button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 13px;
      padding: 8px 4px;
      font-weight: 600;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
    }
    #undo-toast button:hover { color: var(--accent-light); }
    #undo-toast button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <button class="icon-btn" id="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar" title="Toggle sidebar">☰</button>
  <h1>PA</h1>
  <span class="status" id="status" aria-live="polite">Personal Assistant</span>
  <button class="icon-btn" id="clear-btn" onclick="clearConversation()" aria-label="Clear conversation" title="Clear conversation">⊘</button>
</header>

<div id="sidebar-backdrop" onclick="closeSidebarOnMobile()" aria-hidden="true"></div>


<div id="main-layout">

  <!-- ── Sidebar ── -->
  <nav id="sidebar" aria-label="Quick actions">

    <div class="sidebar-section">
      <div class="sidebar-label">Daily</div>

      <button class="quick-action" onclick="runAction('morning-briefing')">
        <span class="qa-icon">☀️</span>
        <span class="qa-text">
          <span class="qa-title">Morning briefing</span>
          <span class="qa-desc">Weather, email, news, calendar</span>
        </span>
      </button>

      <button class="quick-action" onclick="runAction('week-ahead')">
        <span class="qa-icon">📆</span>
        <span class="qa-text">
          <span class="qa-title">Week ahead</span>
          <span class="qa-desc">5-day calendar preview</span>
        </span>
      </button>
    </div>

    <hr class="sidebar-divider">

    <div class="sidebar-section">
      <div class="sidebar-label">Email</div>

      <button class="quick-action" onclick="runAction('reply-needed')">
        <span class="qa-icon">📧</span>
        <span class="qa-text">
          <span class="qa-title">Reply needed</span>
          <span class="qa-desc">Threads awaiting response</span>
        </span>
      </button>

      <button class="quick-action" onclick="runAction('follow-ups')">
        <span class="qa-icon">📤</span>
        <span class="qa-text">
          <span class="qa-title">Follow-ups</span>
          <span class="qa-desc">Sent with no reply 3+ days</span>
        </span>
      </button>
    </div>

    <hr class="sidebar-divider">

    <div class="sidebar-section">
      <div class="sidebar-label">Calendar</div>

      <button class="quick-action" onclick="runAction('plan-ahead')">
        <span class="qa-icon">🗺️</span>
        <span class="qa-text">
          <span class="qa-title">Plan ahead</span>
          <span class="qa-desc">Events needing prep in 2 weeks</span>
        </span>
      </button>

      <button class="quick-action" onclick="runAction('conflicts')">
        <span class="qa-icon">⚠️</span>
        <span class="qa-text">
          <span class="qa-title">Conflicts & gaps</span>
          <span class="qa-desc">Overlaps or back-to-back issues</span>
        </span>
      </button>
    </div>

    <hr class="sidebar-divider">

    <div class="sidebar-section">
      <div class="sidebar-label">News</div>

      <button class="quick-action" onclick="runAction('tech-news')">
        <span class="qa-icon">🤖</span>
        <span class="qa-text">
          <span class="qa-title">AI & Cloud news</span>
          <span class="qa-desc">Latest in tech & infrastructure</span>
        </span>
      </button>

      <button class="quick-action" onclick="runAction('finance-news')">
        <span class="qa-icon">📊</span>
        <span class="qa-text">
          <span class="qa-title">Finance news</span>
          <span class="qa-desc">Markets & economic updates</span>
        </span>
      </button>

      <button class="quick-action" onclick="runAction('local-news')">
        <span class="qa-icon">📍</span>
        <span class="qa-text">
          <span class="qa-title">Austin news</span>
          <span class="qa-desc">Local headlines & updates</span>
        </span>
      </button>
    </div>

    <hr class="sidebar-divider">

    <div class="sidebar-section">
      <div class="sidebar-label">Ireland</div>

      <button class="quick-action" onclick="runAction('ireland-rentals')">
        <span class="qa-icon">🏠</span>
        <span class="qa-text">
          <span class="qa-title">Apartment search</span>
          <span class="qa-desc">Daft.ie rentals near Dublin</span>
        </span>
      </button>
    </div>

  </nav>

  <!-- ── Chat ── -->
  <div id="chat-area">
    <div id="messages">
      <div class="empty-state" id="empty-state">
        <h2 id="greeting-text">Good morning.</h2>
        <p>What can I help you with?</p>
        <div class="suggestions">
          <div class="suggestion" onclick="sendSuggestion('Morning briefing')">Morning briefing</div>
          <div class="suggestion" onclick="sendSuggestion(&quot;What's on my calendar today?&quot;)">Today's calendar</div>
          <div class="suggestion" onclick="sendSuggestion('Any important emails?')">Important emails</div>
          <div class="suggestion" onclick="sendSuggestion(&quot;What's the weather?&quot;)">Weather</div>
          <div class="suggestion" onclick="sendSuggestion(&quot;What's in the news?&quot;)">News headlines</div>
        </div>
      </div>
    </div>

    <div id="input-area">
      <div id="input-wrap">
        <textarea id="input" placeholder="Ask anything..." rows="1"></textarea>
        <button id="send-btn" onclick="send()">&#9650;</button>
      </div>
    </div>
  </div>

</div><!-- /main-layout -->

<div id="undo-toast">
  Conversation cleared.
  <button onclick="undoClear()">Undo</button>
</div>

<script>
  const input = document.getElementById('input');
  const messages = document.getElementById('messages');
  const sendBtn = document.getElementById('send-btn');
  const statusEl = document.getElementById('status');
  const undoToast = document.getElementById('undo-toast');
  const sidebar = document.getElementById('sidebar');
  const sidebarBackdrop = document.getElementById('sidebar-backdrop');

  let streaming = false;
  let undoSnapshot = null;
  let undoTimer = null;
  let sidebarOpen = true;

  const STORAGE_KEY = 'pa_conversation';
  const SIDEBAR_KEY = 'pa_sidebar_open';
  const MAX_MESSAGES = 50;

  // --- Quick action prompts ---
  const ACTIONS = {
    'morning-briefing': 'Morning briefing',
    'week-ahead': "Give me a preview of my week ahead — summarize my calendar for the next 5 days, highlight any important events, deadlines, or things I should know about.",
    'reply-needed': "Scan my recent emails and identify conversations that need a response from me. Skip newsletters, promotions, automated notifications, and anything that doesn't require a reply. For each thread that needs attention, tell me who it's from, what it's about, and what action I should take.",
    'follow-ups': "Check my sent emails from the last 7 days and identify any messages where I haven't received a reply and might need to follow up. Tell me who the email was to, what it was about, and how many days ago I sent it.",
    'plan-ahead': "Look at my calendar for the next 2 weeks and flag any events that might need advance planning — trips, medical appointments, big meetings, deadlines, or multi-step preparations. For each one, tell me what it is, when it is, and what I should be doing now to prepare.",
    'conflicts': "Review my calendar for the next week and flag any scheduling issues — overlapping events, back-to-back meetings with no buffer, or events that seem to conflict with each other. Let me know what the conflicts are and suggest how I might resolve them.",
    'tech-news': "Give me a quick recap of the latest news in AI and cloud technology. Focus on significant product launches, major research breakthroughs, or important industry moves from the past day or two.",
    'finance-news': "Give me a quick financial news recap — what's happening in the markets, any notable economic data, or major corporate news from the past day or two.",
    'local-news': "What's going on in Austin? Give me a quick summary of the top local headlines from the Statesman or other Austin news sources.",
    'ireland-rentals': "Search Daft.ie for rental apartments near Dublin — Bray, Greystones, Dún Laoghaire, and Sandyford. 2+ bedrooms, max €2,800/month. Show me what's available with prices, beds, and links.",
  };

  // --- Sidebar ---
  function initSidebar() {
    const saved = localStorage.getItem(SIDEBAR_KEY);
    const isMobile = window.innerWidth <= 600;
    // Mobile always starts collapsed — overlay should never auto-open
    sidebarOpen = isMobile ? false : (saved === null ? true : saved === 'true');
    applySidebarState();
  }

  function toggleSidebar() {
    sidebarOpen = !sidebarOpen;
    localStorage.setItem(SIDEBAR_KEY, sidebarOpen);
    applySidebarState();
  }

  function applySidebarState() {
    const isMobile = window.innerWidth <= 600;
    if (sidebarOpen) {
      sidebar.classList.remove('collapsed');
      if (isMobile) sidebarBackdrop.classList.add('visible');
    } else {
      sidebar.classList.add('collapsed');
      sidebarBackdrop.classList.remove('visible');
    }
  }

  function closeSidebarOnMobile() {
    if (window.innerWidth <= 600) {
      sidebarOpen = false;
      localStorage.setItem(SIDEBAR_KEY, false);
      applySidebarState();
    }
  }

  function runAction(key) {
    const prompt = ACTIONS[key];
    if (!prompt) return;
    // On mobile, close the sidebar so the response is visible
    closeSidebarOnMobile();
    sendSuggestion(prompt);
  }

  initSidebar();

  // --- Greeting ---
  function greeting() {
    const h = new Date().getHours();
    if (h >= 5 && h < 12) return 'Good morning.';
    if (h >= 12 && h < 17) return 'Good afternoon.';
    if (h >= 17 && h < 21) return 'Good evening.';
    return 'Working late?';
  }
  document.getElementById('greeting-text').textContent = greeting();

  // Check URL for OAuth success
  const params = new URLSearchParams(window.location.search);
  if (params.get('connected')) {
    const provider = params.get('connected');
    addSystemMessage(`${provider.charAt(0).toUpperCase() + provider.slice(1)} connected successfully.`);
    window.history.replaceState({}, '', '/');
  }

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 200) + 'px';
  });

  // Submit on Enter (Shift+Enter for newline)
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // --- Conversation persistence ---
  function saveConversation() {
    const msgs = [...messages.querySelectorAll('.message')].map(el => ({
      role: el.classList.contains('user') ? 'user' : 'assistant',
      // Save raw markdown for assistant messages — innerHTML would re-inflate on load,
      // rawText preserves the source of truth for history sent back to Claude.
      text: el.classList.contains('user')
        ? el.textContent
        : (el.dataset.rawText || el.querySelector('.content')?.textContent || ''),
      isHTML: el.classList.contains('assistant'),
    }));
    const capped = msgs.slice(-MAX_MESSAGES);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(capped));
    } catch (e) {
      // QuotaExceededError — degrade silently
    }
  }

  function loadConversation() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const msgs = JSON.parse(raw);
      if (!Array.isArray(msgs) || msgs.length === 0) return;

      hideEmptyState();
      for (const m of msgs) {
        const el = document.createElement('div');
        el.className = `message ${m.role}`;
        if (m.role === 'assistant') {
          el.dataset.rawText = m.text;
          el.innerHTML = `
            <div class="content">${renderMarkdown(m.text)}</div>
            <button class="copy-btn" aria-label="Copy response" onclick="copyMessage(this)">Copy</button>
          `;
        } else {
          el.textContent = m.text;
        }
        messages.appendChild(el);
      }
      messages.scrollTop = messages.scrollHeight;
    } catch (e) {
      // Corrupted JSON — show empty state (already shown by default)
    }
  }

  function clearConversation() {
    undoSnapshot = localStorage.getItem(STORAGE_KEY);

    localStorage.removeItem(STORAGE_KEY);
    [...messages.querySelectorAll('.message, [style*="text-align"]')].forEach(el => el.remove());
    showEmptyState();

    clearTimeout(undoTimer);
    undoToast.classList.add('visible');
    undoTimer = setTimeout(() => {
      undoToast.classList.remove('visible');
      undoSnapshot = null;
    }, 4000);
  }

  function undoClear() {
    clearTimeout(undoTimer);
    undoToast.classList.remove('visible');
    if (!undoSnapshot) return;
    try {
      localStorage.setItem(STORAGE_KEY, undoSnapshot);
    } catch (e) {}
    undoSnapshot = null;
    hideEmptyState();
    [...messages.querySelectorAll('.message')].forEach(el => el.remove());
    loadConversation();
  }

  loadConversation();

  // --- Sending ---
  function sendSuggestion(text) {
    input.value = text;
    send();
  }

  function send() {
    const text = input.value.trim();
    if (!text || streaming) return;

    hideEmptyState();
    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';

    streamMessage(text);
  }

  async function streamMessage(message) {
    streaming = true;
    sendBtn.disabled = true;
    statusEl.textContent = 'Thinking...';

    const msgEl = addMessage('assistant', '');
    const contentEl = msgEl.querySelector('.content');
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    contentEl.appendChild(cursor);

    let fullText = '';
    let gotFirstToken = false;

    try {
      // Build conversation history from displayed messages (excluding the two just added:
      // the new user message and the empty assistant placeholder).
      const allMsgs = [...messages.querySelectorAll('.message')];
      const history = allMsgs.slice(0, -2).slice(-20).map(el => ({
        role: el.classList.contains('user') ? 'user' : 'assistant',
        content: el.classList.contains('user')
          ? el.textContent.trim()
          // Use stored raw markdown — textContent would strip ** bold **, bullets, etc.
          : (el.dataset.rawText || el.querySelector('.content')?.textContent || '').trim(),
      })).filter(m => m.content);

      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, history }),
      });

      if (!resp.ok) {
        contentEl.innerHTML = `<p style="color:#e05050">Error ${resp.status}: ${resp.statusText}</p>`;
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try {
            const parsed = JSON.parse(data);
            if (parsed.error) {
              const errP = document.createElement('p');
              errP.style.color = '#e05050';
              errP.textContent = `Error: ${parsed.error}`;
              contentEl.replaceChildren(errP);
              break;
            }
            if (parsed.text) {
              if (!gotFirstToken) {
                gotFirstToken = true;
                statusEl.textContent = 'Responding...';
              }
              fullText += parsed.text;
              cursor.remove();
              contentEl.innerHTML = renderMarkdown(fullText);
              contentEl.appendChild(cursor);
              messages.scrollTop = messages.scrollHeight;
            }
          } catch {}
        }
      }
    } catch (err) {
      contentEl.innerHTML = `<p style="color:#e05050">Connection error: ${err.message}</p>`;
    } finally {
      cursor.remove();
      // Persist raw markdown so history sent back to Claude is never degraded
      // by textContent stripping. contentEl.textContent loses **bold**, bullets, etc.
      msgEl.dataset.rawText = fullText;
      streaming = false;
      sendBtn.disabled = false;
      statusEl.textContent = 'Personal Assistant';
      input.focus();
      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.setAttribute('aria-label', 'Copy response');
      copyBtn.textContent = 'Copy';
      copyBtn.onclick = function() { copyMessage(this); };
      msgEl.appendChild(copyBtn);
      saveConversation();
    }
  }

  function addMessage(role, text) {
    const el = document.createElement('div');
    el.className = `message ${role}`;
    if (role === 'assistant') {
      el.innerHTML = `<div class="content">${renderMarkdown(text)}</div>`;
    } else {
      el.textContent = text;
    }
    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
    return el;
  }

  function addSystemMessage(text) {
    const el = document.createElement('div');
    el.style.cssText = 'text-align:center;color:#666;font-size:13px;padding:8px';
    el.textContent = text;
    messages.appendChild(el);
  }

  function hideEmptyState() {
    const es = document.getElementById('empty-state');
    if (es) es.remove();
  }

  function showEmptyState() {
    const existing = document.getElementById('empty-state');
    if (existing) existing.remove();
    const es = document.createElement('div');
    es.className = 'empty-state';
    es.id = 'empty-state';
    es.innerHTML = `
      <h2>${greeting()}</h2>
      <p>What can I help you with?</p>
      <div class="suggestions">
        <div class="suggestion" onclick="sendSuggestion('Morning briefing')">Morning briefing</div>
        <div class="suggestion" onclick="sendSuggestion(&quot;What's on my calendar today?&quot;)">Today's calendar</div>
        <div class="suggestion" onclick="sendSuggestion('Any important emails?')">Important emails</div>
        <div class="suggestion" onclick="sendSuggestion(&quot;What's the weather?&quot;)">Weather</div>
        <div class="suggestion" onclick="sendSuggestion(&quot;What's in the news?&quot;)">News headlines</div>
      </div>
    `;
    messages.insertBefore(es, messages.firstChild);
  }

  // --- Copy ---
  async function copyMessage(btn) {
    const content = btn.previousElementSibling;
    const text = content ? content.innerText : '';
    try {
      await navigator.clipboard.writeText(text);
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.style.color = '#70c070';
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
    } catch (e) {
      btn.textContent = 'Failed';
      setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
    }
  }

  // --- Markdown renderer ---
  function renderMarkdown(text) {
    const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const inline = s => esc(s)
      .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');

    const lines = text.split('\n');
    const out = [];
    let i = 0;

    while (i < lines.length) {
      const line = lines[i];
      if (/^\|/.test(line) && i + 1 < lines.length && /^\|[-:| ]+\|/.test(lines[i + 1])) {
        const parseRow = r => r.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
        const headers = parseRow(line);
        i += 2;
        const rows = [];
        while (i < lines.length && /^\|/.test(lines[i])) {
          rows.push(parseRow(lines[i]));
          i++;
        }
        const ths = headers.map(h => `<th>${inline(h)}</th>`).join('');
        const trs = rows.map(r => '<tr>' + r.map(c => `<td>${inline(c)}</td>`).join('') + '</tr>').join('');
        out.push(`<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`);
        continue;
      }
      const h3 = line.match(/^### (.+)$/); if (h3) { out.push(`<h3>${inline(h3[1])}</h3>`); i++; continue; }
      const h2 = line.match(/^## (.+)$/);  if (h2) { out.push(`<h2>${inline(h2[1])}</h2>`); i++; continue; }
      const h1 = line.match(/^# (.+)$/);   if (h1) { out.push(`<h1>${inline(h1[1])}</h1>`); i++; continue; }
      if (/^---$/.test(line)) { out.push('<hr>'); i++; continue; }
      if (/^[-*] /.test(line)) {
        const items = [];
        while (i < lines.length && /^[-*] /.test(lines[i])) {
          items.push(`<li>${inline(lines[i].slice(2))}</li>`);
          i++;
        }
        out.push(`<ul>${items.join('')}</ul>`);
        continue;
      }
      if (line.trim() === '') { out.push(''); i++; continue; }
      out.push(`<p>${inline(line)}</p>`);
      i++;
    }

    return out.join('\n');
  }
</script>
</body>
</html>
